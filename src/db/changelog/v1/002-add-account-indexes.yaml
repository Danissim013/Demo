databaseChangeLog:
  - changeSet:
      id: 002-add-account-indexes
      author: isp-21-student
      changes:
        - createIndex:
            indexName: idx_accounts_user_id
            tableName: accounts
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_accounts_user_currency
            tableName: accounts
            columns:
              - column:
                  name: user_id
              - column:
                  name: currency
        - createIndex:
            indexName: idx_accounts_status
            tableName: accounts
            columns:
              - column:
                  name: status
      rollback:
        - dropIndex:
            indexName: idx_accounts_user_id
            tableName: accounts
        - dropIndex:
            indexName: idx_accounts_user_currency
            tableName: accounts
        - dropIndex:
            indexName: idx_accounts_status
            tableName: accounts
